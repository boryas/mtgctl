# mtgctl Configuration File

[game_entry]
# Default archetype to pre-select during match entry
# Example: "Doomsday", "Lands"
default_archetype = "Doomsday"

# Default subtype to pre-select (only used if default_archetype is set)
# Example: "Tempo", "Mono Green"
default_subtype = "Tempo"

# Default list/version to pre-select (only used if archetype and subtype are set)
# Example: "tempo-doomsday-wasteland-1.0", "sprouts-2.1"
# default_list = "tempo-doomsday-bug-1.0"

# Default era to assign to new matches
# Use an integer without quotes (e.g., default_era = 2)
# Leave empty or comment out to auto-detect current era from database
default_era = 2

[stats]
# Pre-select these filters (you'll still be prompted for values)
# Options: "era-latest", "era-all", "my-archetype", "my-subtype", "my-list",
#          "opponent", "opponent-deck", "event-type", "loss-reason",
#          "win-condition", "game-plan", "mulligan-count", "game-length",
#          "game-number", "play-draw"
default_filters = ["era-latest", "my-archetype"]

# Default groupings to show
# Options: "my-archetype", "my-subtype", "my-list", "opponent", "opponent-deck",
#          "opponent-deck-archetype", "opponent-deck-category", "era",
#          "game-number", "mulligans", "game-plan", "win-condition", "game-length"
#default_groupbys = ["opponent-deck-archetype"]

# Default statistics to display
# Options: "win-rate", "match-count", "game-count", "mulligans",
#          "game-length", "win-conditions", "loss-conditions"
default_statistics = ["win-rate", "proportion"]

# Default filters to apply
# Available filter types: "era", "my-deck", "opponent", "opponent-deck", "event-type"
[stats.filters]
# Filter by specific era (use integer)
# era = 2
