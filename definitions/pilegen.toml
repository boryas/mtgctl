# Doomsday pile scenario generator — card catalog and opponent archetypes
#
# [[cards]] entries define every card the generator needs to reason about.
# Cards not in the catalog are treated as generic non-land spells: hand-eligible,
# not permanent candidates, not exileable.
#
# card_type: "land" | "creature" | "planeswalker" | "artifact" | "instant" |
#            "sorcery" | "enchantment"
#
# Land-specific fields:
#   is_fetch          — fetchlands are always untapped when in play
#   produces_black    — land can tap for black mana
#   annotation_options — one option is picked at random (e.g. Cavern creature type)
#
# DFC fields (for cards with two faces):
#   flipped_name       — display name of the back face
#   flipped_card_type  — card type of the back face
#   flipped_loyalty    — loyalty of the back face (if planeswalker)
#
# Planeswalker field:
#   loyalty            — starting loyalty
#
# Exile rules:
#   exileable          — can appear in exile zone (blue cards pitched to Force of Will)
#
# Play weight:
#   play_weight        — relative likelihood of appearing as a permanent in play.
#                        Default 100. Lower = rarer (e.g. 1 = ~1% chance, 25 = ~25%).

