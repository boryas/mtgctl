# ── Opponent archetypes ───────────────────────────────────────────────────────
#
# hand          — cards that may be in their hand (one revealed 15% of the time by default)
# pressure      — permanents that attack or threaten lethal
# disruption    — permanents that interfere with our plan
# other         — utility permanents (vials, mana sources, etc.)
# used          — spells/abilities already expended this game
#
# Optional per-archetype distribution overrides (index = count, value = weight):
#   pressure_weights, disruption_weights, other_weights, used_weights
# Optional:
#   lands_delta       — offset from our land count (default 0)
#   known_hand_prob   — percent chance of revealing a hand card (default 15)
#
# Archetype names must match the DB display format: "Archetype" or "Archetype: Subtype".

